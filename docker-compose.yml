services:
  server:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      quickchart:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  db:
    image: postgres:16-alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tga} -d ${POSTGRES_DB:-tganalytics}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  quickchart:
    image: ianw/quickchart
    restart: unless-stopped

volumes:
  pgdata:
